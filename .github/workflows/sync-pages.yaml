permissions: {}

on:
  push:
    branches:
      - 'main'
    paths:
      - 'README.md'
      - 'changelog/index.html'
      - 'docs/**'

jobs:
  build:
    permissions:
      contents: write # for git push

    runs-on: ubuntu-24.04
    steps:

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: true
          ref: gh-pages
          path: gh-pages

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          path: main

      - name: Copy files and push to gh-pages
        working-directory: gh-pages
        run: |
          cp -a ../main/README.md .
          cp -a ../main/changelog .
          cp -a ../main/docs .

          rm -rf ./changelog/README.md ./docs/README.md

          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"
          git add README.md changelog/index.html
          git commit --signoff -m "Sync from main"
          git push
