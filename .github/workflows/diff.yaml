name: Diff
permissions: {}

on:
  pull_request_target: # zizmor: ignore[dangerous-triggers] generally, this is an bad idea. However, there is no other way to comment on PRs from forks without using pull_request_target. We mitigate the risk by separate write permession to a different job where no user controlled code is executed.
    branches:
      - main

jobs:
  diff:
    name: check diff
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      changed: ${{ steps.list-changed.outputs.changed }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          # renovate: github=helm/helm
          version: v4.1.3

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'

      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0
        with:
          # renovate: github=helm/chart-testing
          version: v3.14.0

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          changed=$(ct list-changed --config charts/ct.yaml)
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "changed_list=\"${changed//$'\n'/ }\"" >> "$GITHUB_OUTPUT"
          fi

      - name: install helm unittest plugin
        if: steps.list-changed.outputs.changed == 'true'
        run: helm plugin install https://github.com/databus23/helm-diff --version 3.15.4 --verify=false

      - name: Create kind cluster
        if: steps.list-changed.outputs.changed == 'true'
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0

      - name: Checkout Target of PR
        if: steps.list-changed.outputs.changed == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: target
          ref: ${{ github.event.pull_request.base.ref }}
          persist-credentials: false

      - name: Apply Gateway API CRDs
        if: steps.list-changed.outputs.changed == 'true'
        run: kubectl apply -k https://github.com/kubernetes-sigs/gateway-api/config/crd

      - name: Run chart-testing (diff)
        if: steps.list-changed.outputs.changed == 'true'
        #language=bash
        run: |
          # shellcheck disable=SC2086,SC2116
          CHANGED_LIST=$(echo $CHANGED_LIST)
          for chart in $CHANGED_LIST; do
            chart="${chart//\"}"
            chart="${chart##*/}"
            helm upgrade -i "$chart" "./target/charts/$chart" --create-namespace --namespace "$chart" --wait
            {
              printf '```diff\n';
              helm diff upgrade "$chart" "./charts/$chart" \
                --namespace "$chart" \
                --suppress=CustomResourceDefinition \
                --normalize-manifests \
                --reset-values \
                --no-color \
                -C 5 \
                --suppress-output-line-regex="helm.sh/chart:" \
                --suppress-output-line-regex="chart:" \
                --suppress-output-line-regex="app.kubernetes.io/version:" | tee /dev/stderr;
              printf '\n```';
            } > "diff.txt"
          done
        env:
          CHANGED_LIST: ${{ steps.list-changed.outputs.changed_list }}

      - name: Save diff output as artifact
        if: steps.list-changed.outputs.changed == 'true'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: diff-output
          path: diff.txt
          archive: false
  comment:
    name: Comment diff
    runs-on: ubuntu-latest
    needs:
      - diff
    if: needs.diff.outputs.changed == 'true'
    permissions:
      contents: write
    steps:
      - name: Save diff output as artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: diff-output

      - name: Comment PR
        uses: thollander/actions-comment-pull-request@24bffb9b452ba05a4f3f77933840a6a841d1b32b # v3.0.1
        with:
          comment-tag: helm-diff
          create-if-not-exists: true
          mode: upsert
          file-path: "diff.txt"
